<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nuestra Galaxia</title>
<style>
  :root {
    --bg-deep: #05010f;
    --bg-mid: #150a30;
    --bg-glow: #2a1152;
    --star-white: #f5f3ff;
    --purple-neon: #b388ff;
    --blue-neon: #64d9ff;
    --gold: #ffd97a;
    --text-soft: #e6e1ff;
    --font-display: Georgia, 'Iowan Old Style', 'Palatino Linotype', 'Book Antiqua', serif;
    --font-ui: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  }

  * { box-sizing: border-box; }
  html, body { margin:0; padding:0; }

  body {
    background: radial-gradient(ellipse 120% 60% at 50% 0%, var(--bg-glow), var(--bg-mid) 45%, var(--bg-deep) 85%);
    min-height: 100vh;
    overflow-x: hidden;
    font-family: var(--font-ui);
    color: var(--text-soft);
    position: relative;
  }

  canvas#fondo-estrellas {
    position: fixed; top:0; left:0; width:100%; height:100%; z-index:0;
  }

  .contenido {
    position: relative; z-index: 2;
    display:flex; flex-direction:column; align-items:center;
    padding: 64px 20px 90px;
    text-align:center;
  }

  .mensaje-intro {
    font-family: var(--font-display);
    font-size: clamp(1.05rem, 2.6vw, 1.5rem);
    font-style: italic;
    max-width: 560px;
    line-height: 1.5;
    opacity: 0;
    animation: aparecer 1.8s ease forwards 0.4s;
    text-shadow: 0 0 24px rgba(179,136,255,0.45);
    margin-bottom: 18px;
  }

  .nombre-constelacion {
    font-family: var(--font-display);
    font-weight: 700;
    font-size: clamp(2.1rem, 6.5vw, 3.4rem);
    letter-spacing: 4px;
    margin: 6px 0 14px;
    background: linear-gradient(90deg, var(--purple-neon), var(--blue-neon));
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    opacity: 0;
    animation: aparecer 1.8s ease forwards 1.1s;
  }

  .instruccion {
    font-size: 0.85rem;
    letter-spacing: 0.5px;
    opacity: 0;
    animation: aparecer 1.8s ease forwards 1.8s;
    margin-bottom: 46px;
    color: var(--text-soft);
  }

  @keyframes aparecer { to { opacity: 1; } }

  .constelacion-contenedor {
    position: relative;
    width: min(92vw, 680px);
    aspect-ratio: 1 / 0.95;
    margin: 0 auto;
    transition: transform 0.4s ease-out;
  }

  svg.lineas {
    position: absolute; inset: 0; width:100%; height:100%;
    pointer-events: none;
  }
  svg.lineas line {
    stroke: rgba(179,136,255,0.28);
    stroke-width: 1.3;
    vector-effect: non-scaling-stroke;
    stroke-dasharray: 3 5;
  }
  svg.lineas line.linea-especial {
    stroke: rgba(255,217,122,0.55);
    stroke-dasharray: none;
    opacity: 0;
    animation: aparecer-linea 1.8s ease forwards;
  }
  @keyframes aparecer-linea { to { opacity: 1; } }

  .estrella {
    position: absolute;
    width: 24px; height: 24px;
    transform: translate(-50%,-50%);
    cursor: pointer;
    background: var(--star-white);
    border-radius: 50%;
    box-shadow: 0 0 10px 3px var(--purple-neon), 0 0 22px 7px rgba(179,136,255,0.35);
    animation: titilar 3.2s ease-in-out infinite;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
    transition: transform 0.25s ease;
  }
  .estrella::after {
    content: attr(data-etiqueta);
    position: absolute;
    top: 135%; left: 50%; transform: translateX(-50%);
    font-size: 0.72rem;
    white-space: nowrap;
    opacity: 0;
    transition: opacity 0.25s;
    color: var(--text-soft);
    pointer-events: none;
  }
  .estrella:hover, .estrella:focus-visible { transform: translate(-50%,-50%) scale(1.45); }
  .estrella:hover::after, .estrella:focus-visible::after { opacity: 0.9; }
  .estrella.descubierta {
    background: var(--gold);
    box-shadow: 0 0 12px 4px var(--gold), 0 0 20px 8px rgba(255,217,122,0.35);
  }
  .estrella:focus-visible, .estrella-especial:focus-visible {
    outline: 2px solid var(--blue-neon);
    outline-offset: 4px;
  }

  @keyframes titilar {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.55; }
  }

  .estrella-especial {
    position: absolute;
    border-radius: 50%;
    transform: translate(-50%,-50%);
    width: 36px; height: 36px;
    background: var(--gold);
    box-shadow: 0 0 22px 7px var(--gold), 0 0 42px 14px rgba(255,217,122,0.5);
    opacity: 0;
    pointer-events: none;
    transition: transform 0.25s ease;
  }
  .estrella-especial.visible {
    opacity: 1;
    pointer-events: auto;
    cursor: pointer;
    animation: titilar 2.6s ease-in-out infinite, pulso-especial 2.2s ease-in-out infinite;
  }
  .estrella-especial.visible:hover,
  .estrella-especial.visible:focus-visible {
    transform: translate(-50%,-50%) scale(1.3);
  }
  @keyframes pulso-especial {
    0%, 100% { box-shadow: 0 0 22px 7px var(--gold), 0 0 42px 14px rgba(255,217,122,0.5); }
    50% { box-shadow: 0 0 32px 11px var(--gold), 0 0 60px 22px rgba(255,217,122,0.7); }
  }

  .progreso {
    margin-top: 34px;
    font-size: 0.82rem;
    letter-spacing: 0.5px;
    opacity: 0.75;
    max-width: 320px;
  }

  .overlay {
    position: fixed; inset: 0;
    background: rgba(5,1,15,0.86);
    backdrop-filter: blur(6px);
    display: flex; align-items: center; justify-content: center;
    z-index: 10; opacity: 0; pointer-events: none;
    transition: opacity 0.35s ease;
    padding: 24px;
  }
  .overlay.activo { opacity: 1; pointer-events: auto; }

  .tarjeta {
    background: linear-gradient(160deg, #1a0f3a, #0d0722);
    border: 1px solid rgba(179,136,255,0.4);
    border-radius: 20px;
    padding: 38px 30px 32px;
    max-width: 420px;
    width: 100%;
    text-align: center;
    box-shadow: 0 0 44px rgba(100,217,255,0.15);
    transform: scale(0.92);
    transition: transform 0.35s ease;
    position: relative;
    max-height: 85vh;
    overflow-y: auto;
  }
  .overlay.activo .tarjeta { transform: scale(1); }

  .tarjeta .icono { font-size: 2.1rem; margin-bottom: 8px; }
  .tarjeta h3 {
    font-family: var(--font-display);
    font-size: 1.35rem;
    margin: 0 0 16px;
    color: var(--purple-neon);
  }
  .tarjeta p {
    line-height: 1.65;
    font-size: 0.98rem;
    color: var(--text-soft);
    white-space: pre-wrap;
    margin: 0;
  }

  .cerrar {
    position: absolute; top: 10px; right: 14px;
    background: none; border: none; color: var(--text-soft);
    font-size: 1.5rem; cursor: pointer; opacity: 0.55;
    line-height: 1; padding: 6px;
  }
  .cerrar:hover, .cerrar:focus-visible { opacity: 1; }

  .media-placeholder {
    margin-top: 16px; padding: 14px;
    border: 1px dashed rgba(255,255,255,0.25);
    border-radius: 10px;
    font-size: 0.78rem;
    opacity: 0.65;
    line-height: 1.5;
  }
  img.recuerdo-media, video.recuerdo-media { max-width: 100%; border-radius: 12px; margin-top: 16px; display:block; }
  audio.recuerdo-media { width: 100%; margin-top: 16px; }

  #musica-toggle {
    position: fixed; bottom: 20px; right: 20px; z-index: 5;
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(179,136,255,0.4);
    color: var(--text-soft);
    border-radius: 30px;
    padding: 10px 18px;
    cursor: pointer;
    font-size: 0.82rem;
    font-family: var(--font-ui);
    backdrop-filter: blur(4px);
  }
  #musica-toggle:hover, #musica-toggle:focus-visible { background: rgba(255,255,255,0.13); }

  @media (max-width: 480px) {
    .estrella { width: 20px; height: 20px; }
    .estrella-especial { width: 30px; height: 30px; }
  }

  @media (prefers-reduced-motion: reduce) {
    .estrella, .estrella-especial, .mensaje-intro, .nombre-constelacion, .instruccion {
      animation: none !important;
      opacity: 1 !important;
    }
    .constelacion-contenedor { transition: none !important; }
  }
</style>
</head>
<body>

<canvas id="fondo-estrellas"></canvas>

<div class="contenido">
  <p class="mensaje-intro">&ldquo;Hay millones de estrellas&hellip; pero esta galaxia existe gracias a ti.&rdquo;</p>
  <h1 class="nombre-constelacion">Nuestra Galaxia</h1>
  <p class="instruccion">Toca cada estrella para descubrir un recuerdo &#10024;</p>

  <div class="constelacion-contenedor" id="constelacion">
    <svg class="lineas" id="lineas" viewBox="0 0 100 100" preserveAspectRatio="none"></svg>
  </div>

  <p class="progreso" id="progreso">0 / 7 estrellas descubiertas</p>
</div>

<div class="overlay" id="overlay">
  <div class="tarjeta" role="dialog" aria-modal="true">
    <button class="cerrar" id="cerrar" aria-label="Cerrar">&times;</button>
    <div id="contenido-tarjeta"></div>
  </div>
</div>



<script>
(function(){
  // =====================================================================
  // ✏️  EDITA AQUÍ TUS RECUERDOS REALES
  // Cambia "texto" por la historia real. Si quieres agregar una foto, audio
  // o video, escribe el nombre del archivo (debe estar en la misma carpeta
  // que este HTML) en "imagen", "audio" o "video". Si no agregas nada,
  // simplemente no aparece esa parte — no rompe nada.
  // =====================================================================
  const recuerdos = [
    {
      id: 'mensaje', icono: '💌', etiqueta: 'Primer mensaje',
      titulo: 'Nuestro primer mensaje',
      texto: 'Quién diría que decidir estar en Discord ese día nos iba a permitir hablar por primera vez y preguntarnos si queríamos jugar Minecraft. Y míranos ahora, todo empezó con algo tan simple.',
      imagen: null, audio: null, video: null,
      top: 16, left: 20
    },
    {
      id: 'llamada', icono: '📞', etiqueta: 'Primera llamada',
      titulo: 'Nuestra primera llamada',
      texto: 'Nuestra primera llamada, aunque rara, fue algo muy especial para mí, porque encaminó el momento en que empezaría nuestra historia. Tal vez al principio todo se sentía un poco extraño, pero ahora pienso en eso y me doy cuenta de que fue uno de esos momentos pequeños que terminan significando muchísimo.',
      imagen: null, audio: null, video: null,
      top: 7, left: 46
    },
    {
      id: 'pelea', icono: '🕊️', etiqueta: 'Una pelea superada',
      titulo: 'Lo que superamos juntos',
      texto: 'A pesar de los olvidos y de mi mala memoria, siempre predomina el amor. Y aunque la distancia exista entre nosotros, seguimos eligiéndonos y amándonos como desde el principio.',
      imagen: null, audio: null, video: null,
      top: 21, left: 74
    },
    {
      id: 'cancion', icono: '🟢', etiqueta: 'Canción favorita',
      titulo: 'nuestro color',
      texto: 'Nuestro color es único. Mi favorito siempre será el morado y el tuyo el verde, y aunque sean diferentes y estén un poco alejados entre sí, siempre terminan combinando juntos, como nosotros.',
      imagen: null, audio: null, video: null,
      top: 43, left: 87
    },
    {
      id: 'apodo', icono: '😊', etiqueta: 'Tu apodo',
      titulo: 'Así te digo yo',
      texto: 'Así te digo yo, mi oruguita, porque me recuerdas mucho a ellas. No solo por envolverte entre sábanas como si hicieras tu propio capullo, sino porque, al igual que ellas, siempre terminas brillando y luciendo como una preciosa mariposa.',
      imagen: null, audio: null, video: null,
      top: 63, left: 72
    },
    {
      id: 'fecha', icono: '📅', etiqueta: 'Fecha importante',
      titulo: 'Un día que no olvido',
      texto: 'El día que nunca olvido es el día en que te conocí. Aún me parece increíble cómo alguien que era una completa desconocida terminó convirtiéndose en una parte tan importante de mi vida y de mi corazón. Te amo.',
      imagen: null, audio: null, video: null,
      top: 70, left: 40
    },
    {
      id: 'momento', icono: '😂', etiqueta: 'Momento gracioso',
      titulo: 'Ese momento que nos dio risa',
      texto: 'Siempre me haces reír, pero nunca voy a olvidar tu anécdota de cuando un perro quiso entrar a tu casa y tú lo echabas toda desesperada jajaja. Cada vez que lo recuerdo me da mucha risa imaginar la escena.',
      imagen: null, audio: null, video: null,
      top: 50, left: 13
    }
  ];

  const especial = { top: 33, left: 47 };
  const mensajeFinal = 'Cada estrella que tocaste es un pedacito de lo que hemos vivido juntos. Y aunque hay millones de estrellas allá afuera, ninguna brilla como la galaxia que construimos entre los dos.\n\n de tu amor Jhon<3 ';

  // =====================================================================
  // A partir de aquí ya no necesitas tocar nada (a menos que quieras)
  // =====================================================================

  const prefiereMenosMovimiento = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  const contenedor = document.getElementById('constelacion');
  const svgLineas = document.getElementById('lineas');
  const overlay = document.getElementById('overlay');
  const contenidoTarjeta = document.getElementById('contenido-tarjeta');
  const progresoEl = document.getElementById('progreso');
  const descubiertas = new Set();

  function pct(v){ return v + '%'; }

  // --- construir estrellas de recuerdos ---
  recuerdos.forEach((r, i) => {
    const el = document.createElement('div');
    el.className = 'estrella';
    el.style.top = pct(r.top);
    el.style.left = pct(r.left);
    el.dataset.etiqueta = r.etiqueta;
    el.style.animationDelay = (i * 0.3) + 's';
    el.setAttribute('role', 'button');
    el.setAttribute('tabindex', '0');
    el.setAttribute('aria-label', r.etiqueta);
    el.addEventListener('click', () => abrirTarjeta(r, el));
    el.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); abrirTarjeta(r, el); }
    });
    contenedor.appendChild(el);
  });

  // --- estrella especial (aparece al final) ---
  const estrellaEspecial = document.createElement('div');
  estrellaEspecial.className = 'estrella-especial';
  estrellaEspecial.style.top = pct(especial.top);
  estrellaEspecial.style.left = pct(especial.left);
  estrellaEspecial.setAttribute('role', 'button');
  estrellaEspecial.setAttribute('tabindex', '-1');
  estrellaEspecial.setAttribute('aria-label', 'Estrella especial');
  estrellaEspecial.addEventListener('click', abrirTarjetaEspecial);
  estrellaEspecial.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); abrirTarjetaEspecial(); }
  });
  contenedor.appendChild(estrellaEspecial);

  // --- líneas de la constelación ---
  function dibujarLineas(){
    let html = '';
    for (let i = 0; i < recuerdos.length - 1; i++) {
      const a = recuerdos[i], b = recuerdos[i+1];
      html += `<line x1="${a.left}" y1="${a.top}" x2="${b.left}" y2="${b.top}" />`;
    }
    svgLineas.innerHTML = html;
  }
  dibujarLineas();

  function dibujarLineasEspeciales(){
    let html = svgLineas.innerHTML;
    recuerdos.forEach(r => {
      html += `<line class="linea-especial" x1="${r.left}" y1="${r.top}" x2="${especial.left}" y2="${especial.top}" />`;
    });
    svgLineas.innerHTML = html;
  }

  // --- tarjeta / modal ---
  function agregarMedia(tipo, src){
    const el = document.createElement(tipo);
    el.src = src;
    el.className = 'recuerdo-media';
    if (tipo !== 'img') el.controls = true;
    el.addEventListener('error', () => {
      const ph = document.createElement('div');
      ph.className = 'media-placeholder';
      ph.textContent = `Agrega el archivo "${src}" en la misma carpeta que este HTML para que aparezca aquí ✨`;
      el.replaceWith(ph);
    });
    contenidoTarjeta.appendChild(el);
  }

  function abrirTarjeta(r, el){
    descubiertas.add(r.id);
    el.classList.add('descubierta');
    contenidoTarjeta.innerHTML = `
      <div class="icono">${r.icono}</div>
      <h3>${r.titulo}</h3>
      <p>${r.texto}</p>
    `;
    if (r.imagen) agregarMedia('img', r.imagen);
    if (r.audio) agregarMedia('audio', r.audio);
    if (r.video) agregarMedia('video', r.video);
    overlay.classList.add('activo');
    actualizarProgreso();
  }

  function abrirTarjetaEspecial(){
    contenidoTarjeta.innerHTML = `
      <div class="icono">🌟</div>
      <h3>Gracias por existir en mi universo</h3>
      <p>${mensajeFinal}</p>
    `;
    overlay.classList.add('activo');
  }

  function cerrarTarjeta(){ overlay.classList.remove('activo'); }
  document.getElementById('cerrar').addEventListener('click', cerrarTarjeta);
  overlay.addEventListener('click', (e) => { if (e.target === overlay) cerrarTarjeta(); });
  document.addEventListener('keydown', (e) => { if (e.key === 'Escape') cerrarTarjeta(); });

  function actualizarProgreso(){
    const n = descubiertas.size;
    if (n < recuerdos.length) {
      progresoEl.textContent = `${n} / ${recuerdos.length} estrellas descubiertas`;
    } else {
      progresoEl.textContent = '✨ Descubriste todas las estrellas… toca la más brillante ✨';
      setTimeout(() => {
        estrellaEspecial.classList.add('visible');
        estrellaEspecial.setAttribute('tabindex', '0');
        dibujarLineasEspeciales();
        if (!prefiereMenosMovimiento) estallidoDeChispas(estrellaEspecial);
      }, 550);
    }
  }

  // --- chispas al revelar la estrella especial ---
  function estallidoDeChispas(elCentro){
    const rect = elCentro.getBoundingClientRect();
    const cx = rect.left + rect.width / 2, cy = rect.top + rect.height / 2;
    for (let i = 0; i < 16; i++) {
      const p = document.createElement('div');
      p.style.position = 'fixed';
      p.style.left = cx + 'px'; p.style.top = cy + 'px';
      p.style.width = '3px'; p.style.height = '3px';
      p.style.borderRadius = '50%';
      p.style.background = i % 2 === 0 ? 'var(--gold)' : 'var(--purple-neon)';
      p.style.boxShadow = '0 0 6px 2px currentColor';
      p.style.zIndex = '6';
      p.style.pointerEvents = 'none';
      document.body.appendChild(p);
      const angulo = (Math.PI * 2 * i) / 16;
      const dist = 60 + Math.random() * 40;
      const anim = p.animate([
        { transform: 'translate(-50%,-50%) translate(0,0)', opacity: 1 },
        { transform: `translate(-50%,-50%) translate(${Math.cos(angulo)*dist}px, ${Math.sin(angulo)*dist}px)`, opacity: 0 }
      ], { duration: 900 + Math.random() * 400, easing: 'ease-out' });
      anim.onfinish = () => p.remove();
      setTimeout(() => p.remove(), 1600);
    }
  }

  // --- parallax suave con el mouse ---
  if (!prefiereMenosMovimiento) {
    document.addEventListener('mousemove', (e) => {
      const x = (e.clientX / window.innerWidth - 0.5) * 10;
      const y = (e.clientY / window.innerHeight - 0.5) * 10;
      contenedor.style.transform = `translate(${x}px, ${y}px)`;
    });
  }

  // --- fondo de estrellas animado ---
  const canvas = document.getElementById('fondo-estrellas');
  const ctx = canvas.getContext('2d');
  let estrellasFondo = [];

  function ajustarCanvas(){
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    generarEstrellasFondo();
  }

  function generarEstrellasFondo(){
    const cantidad = Math.min(220, Math.floor((canvas.width * canvas.height) / 8500));
    estrellasFondo = Array.from({ length: cantidad }, () => ({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      r: Math.random() * 1.3 + 0.3,
      fase: Math.random() * Math.PI * 2,
      velocidad: Math.random() * 0.3 + 0.05,
      deriva: (Math.random() - 0.5) * 0.05
    }));
  }

  function animarFondo(t){
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    estrellasFondo.forEach(e => {
      const alpha = prefiereMenosMovimiento ? 0.7 : (0.4 + 0.6 * Math.abs(Math.sin(t * 0.001 * e.velocidad + e.fase)));
      ctx.beginPath();
      ctx.arc(e.x, e.y, e.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(230,225,255,${alpha})`;
      ctx.fill();
      if (!prefiereMenosMovimiento) {
        e.y += e.velocidad * 0.05;
        e.x += e.deriva;
        if (e.y > canvas.height) e.y = 0;
        if (e.x > canvas.width) e.x = 0;
        if (e.x < 0) e.x = canvas.width;
      }
    });
    if (!prefiereMenosMovimiento) requestAnimationFrame(animarFondo);
  }

  window.addEventListener('resize', ajustarCanvas);
  ajustarCanvas();
  requestAnimationFrame(animarFondo);
  if (prefiereMenosMovimiento) animarFondo(0);

  // --- estrellas fugaces ocasionales ---
  function estrellaFugaz(){
    const s = document.createElement('div');
    s.style.position = 'fixed';
    s.style.top = (Math.random() * 40) + '%';
    s.style.left = (Math.random() * 55) + '%';
    s.style.width = '2px'; s.style.height = '2px';
    s.style.background = 'white';
    s.style.borderRadius = '50%';
    s.style.boxShadow = '0 0 6px 2px white';
    s.style.zIndex = '1';
    s.style.pointerEvents = 'none';
    document.body.appendChild(s);
    const dx = 220 + Math.random() * 160;
    const dy = 110 + Math.random() * 90;
    const anim = s.animate([
      { transform: 'translate(0,0)', opacity: 0 },
      { transform: `translate(${dx*0.1}px, ${dy*0.1}px)`, opacity: 1, offset: 0.12 },
      { transform: `translate(${dx}px, ${dy}px)`, opacity: 0 }
    ], { duration: 1200, easing: 'ease-out' });
    anim.onfinish = () => s.remove();
    setTimeout(() => s.remove(), 1400);
    setTimeout(estrellaFugaz, 6000 + Math.random() * 9000);
  }
  if (!prefiereMenosMovimiento) setTimeout(estrellaFugaz, 4500);

  // --- música ambiental (sintetizada, sin archivos externos) ---
  let audioCtx, gainNode, iniciada = false, sonando = false;
  function toggleMusica(){
    if (!iniciada) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      gainNode = audioCtx.createGain();
      gainNode.gain.value = 0;
      gainNode.connect(audioCtx.destination);
      const frecuencias = [110, 164.81, 220]; // acorde grave y tranquilo
      frecuencias.forEach((f, i) => {
        const osc = audioCtx.createOscillator();
        osc.type = 'sine';
        osc.frequency.value = f;
        const lfo = audioCtx.createOscillator();
        lfo.frequency.value = 0.08 + i * 0.04;
        const lfoGain = audioCtx.createGain();
        lfoGain.gain.value = 2.5;
        lfo.connect(lfoGain);
        lfoGain.connect(osc.frequency);
        lfo.start();
        osc.connect(gainNode);
        osc.start();
      });
      iniciada = true;
    }
    const boton = document.getElementById('musica-toggle');
    if (sonando) {
      gainNode.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 1);
      sonando = false;
      boton.innerHTML = '&#127925; Música';
    } else {
      audioCtx.resume();
      gainNode.gain.linearRampToValueAtTime(0.045, audioCtx.currentTime + 1.5);
      sonando = true;
      boton.innerHTML = '&#128263; Silenciar';
    }
  }
  document.getElementById('musica-toggle').addEventListener('click', toggleMusica);
})();
</script>
